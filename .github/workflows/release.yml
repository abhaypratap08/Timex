name: Build And Release Timex

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Prepare build directories
        run: |
          mkdir -p build/digital build/analog
          mkdir -p DIGITAL_TIMEX/dist ANALOG_TIMEX/dist

      - name: Build digital Timex
        run: |
          javac -d build/digital DIGITAL_TIMEX/src/Timex.java
          jar --create --file DIGITAL_TIMEX/dist/Timex.jar --main-class Timex -C build/digital .

      - name: Build analog Timex
        run: |
          javac -d build/analog ANALOG_TIMEX/src/Analog.java
          jar --create --file ANALOG_TIMEX/dist/Analog.jar --main-class Analog -C build/analog .

      - name: Upload digital artifact
        uses: actions/upload-artifact@v4
        with:
          name: timex-digital-jar
          path: DIGITAL_TIMEX/dist/Timex.jar

      - name: Upload analog artifact
        uses: actions/upload-artifact@v4
        with:
          name: timex-analog-jar
          path: ANALOG_TIMEX/dist/Analog.jar

      - name: Publish GitHub release assets
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            DIGITAL_TIMEX/dist/Timex.jar
            ANALOG_TIMEX/dist/Analog.jar
          generate_release_notes: true
